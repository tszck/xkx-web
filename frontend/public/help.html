<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>俠客行 幫助總覽</title>
    <style>
      :root {
        --bg-0: #f6f0de;
        --bg-1: #ede1c2;
        --paper: #fffdf5;
        --ink: #2e2921;
        --ink-soft: #6d634e;
        --line: #d8c69f;
        --accent: #8a571f;
        --accent-strong: #6f4517;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "Noto Serif TC", "Source Han Serif TC", "PMingLiU", serif;
        background:
          radial-gradient(1400px 620px at 15% -20%, #fff7dc 0%, rgba(255, 247, 220, 0) 65%),
          linear-gradient(165deg, var(--bg-0) 0%, var(--bg-1) 100%);
      }

      .wrap {
        width: min(1120px, 94vw);
        margin: 22px auto;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--paper);
        overflow: hidden;
        box-shadow:
          0 10px 24px rgba(45, 34, 16, 0.12),
          0 1px 0 rgba(255, 255, 255, 0.8) inset;
      }

      .head {
        padding: 22px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, #fffef8 0%, #f6ecd2 100%);
      }

      .title {
        margin: 0;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1.2;
        letter-spacing: 0.04em;
        color: var(--accent);
      }

      .subtitle {
        margin: 10px 0 0;
        color: var(--ink-soft);
        font-size: 14px;
        line-height: 1.6;
      }

      .status {
        margin-top: 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #ba8e43;
      }

      .toolbar {
        padding: 14px 22px;
        border-bottom: 1px solid var(--line);
        background: #fff8e8;
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .toolbar a,
      .toolbar button {
        border: 1px solid #714819;
        background: linear-gradient(180deg, #9f6a28 0%, #7f531d 100%);
        color: #fff;
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        text-decoration: none;
        cursor: pointer;
      }

      .search {
        margin-left: auto;
        min-width: min(100%, 280px);
        border: 1px solid #ccb789;
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 13px;
        color: var(--ink);
        background: #fffcf2;
      }

      .panel {
        padding: 18px 22px 24px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 10px;
      }

      .topic {
        border: 1px solid #dfcfad;
        border-radius: 9px;
        background: #fff9ea;
        padding: 11px 12px;
      }

      .topic button {
        all: unset;
        cursor: pointer;
        display: block;
      }

      .topic button:focus-visible {
        outline: 2px solid var(--accent);
        border-radius: 4px;
      }

      .topic-key {
        display: inline-flex;
        align-items: center;
        font-family: "Sarasa Mono TC", "Noto Sans Mono CJK TC", monospace;
        font-size: 12px;
        color: #fff;
        background: var(--accent-strong);
        border-radius: 999px;
        padding: 2px 8px;
      }

      .topic-title {
        margin-top: 8px;
        line-height: 1.5;
        color: var(--ink);
        font-size: 14px;
      }

      .meta {
        margin: 0 0 14px;
        color: var(--ink-soft);
        font-size: 13px;
      }

      .empty,
      .raw {
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #fffef8;
        padding: 14px;
      }

      .raw {
        margin-top: 16px;
        font-family: "Sarasa Mono TC", "Noto Sans Mono CJK TC", monospace;
        white-space: pre-wrap;
        line-height: 1.68;
        font-size: 12px;
        max-height: 45vh;
        overflow: auto;
      }

      .hidden { display: none; }

      @media (max-width: 760px) {
        .head, .toolbar, .panel {
          padding-left: 14px;
          padding-right: 14px;
        }

        .search {
          margin-left: 0;
          width: 100%;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="head">
        <h1 class="title">俠客行一百 幫助總覽</h1>
        <p class="subtitle">將原始 help 索引轉為可搜尋、可點選的現代頁面。你可以先看總覽主題，再用遊戲內 help 指令深入查詢。</p>
        <div class="status" id="status"><span class="dot"></span>讀取中…</div>
      </header>

      <div class="toolbar">
        <a href="/xkx-web/">返回遊戲</a>
        <button type="button" id="toggle-raw">顯示原始索引</button>
        <input id="search" class="search" type="search" placeholder="搜尋主題 key 或標題，例如 newbie、武技" />
      </div>

      <main class="panel">
        <p class="meta" id="meta">載入中…</p>
        <div id="grid" class="grid"></div>
        <div id="empty" class="empty hidden">找不到符合的主題。</div>
        <pre id="raw" class="raw hidden"></pre>
      </main>
    </div>

    <script>
      function getApiBaseUrl() {
        const q = new URLSearchParams(window.location.search)
        const override = q.get('api')
        if (override) return override.replace(/\/$/, '')
        if (window.location.hostname === 'tszck.github.io') {
          return 'https://xkx.87.106.31.154.sslip.io/api'
        }
        return '/api'
      }

      function normalize(text) {
        return String(text || '').trim().toLowerCase()
      }

      function getTopicQuery() {
        const q = new URLSearchParams(window.location.search).get('q')
        return q ? q.trim() : ''
      }

      function renderTopics(topics, query) {
        const gridEl = document.getElementById('grid')
        const emptyEl = document.getElementById('empty')
        const q = normalize(query)
        const filtered = topics.filter((it) => {
          if (!q) return true
          return normalize(it.key).includes(q) || normalize(it.title).includes(q)
        })

        gridEl.innerHTML = ''
        if (!filtered.length) {
          emptyEl.classList.remove('hidden')
          return
        }

        emptyEl.classList.add('hidden')
        const frag = document.createDocumentFragment()
        filtered.forEach((it) => {
          const card = document.createElement('article')
          card.className = 'topic'

          const btn = document.createElement('button')
          btn.type = 'button'
          btn.title = `複製指令 help ${it.key}`
          btn.innerHTML = `<span class="topic-key">${it.key}</span><div class="topic-title">${it.title}</div>`
          btn.addEventListener('click', async () => {
            const command = `help ${it.key}`
            try {
              await navigator.clipboard.writeText(command)
              alert(`已複製指令：${command}`)
            } catch (_err) {
              alert(`請在遊戲中輸入：${command}`)
            }
          })

          card.appendChild(btn)
          frag.appendChild(card)
        })
        gridEl.appendChild(frag)
      }

      ;(async function main() {
        const statusEl = document.getElementById('status')
        const metaEl = document.getElementById('meta')
        const rawEl = document.getElementById('raw')
        const searchEl = document.getElementById('search')
        const toggleRawEl = document.getElementById('toggle-raw')
        const apiBaseUrl = getApiBaseUrl()

        try {
          const [catalogRes, topicsRes] = await Promise.all([
            fetch(`${apiBaseUrl}/help/catalog`),
            fetch(`${apiBaseUrl}/help/topics`),
          ])
          if (!catalogRes.ok) throw new Error(`catalog HTTP ${catalogRes.status}`)
          if (!topicsRes.ok) throw new Error(`topics HTTP ${topicsRes.status}`)

          const catalog = await catalogRes.json()
          const topicsPayload = await topicsRes.json()
          const topics = Array.isArray(catalog.topics) ? catalog.topics : []

          renderTopics(topics, '')
          metaEl.textContent = `共 ${catalog.count || topics.length} 個主題。點擊任一主題可複製 help 指令。`
          rawEl.textContent = topicsPayload.text || ''
          statusEl.textContent = '已更新'

          const initialQuery = getTopicQuery()
          if (initialQuery) {
            searchEl.value = initialQuery
            renderTopics(topics, initialQuery)
            metaEl.textContent = `查詢「${initialQuery}」：共 ${topics.length} 個主題，可點擊卡片複製 help 指令。`
          }

          searchEl.addEventListener('input', () => {
            renderTopics(topics, searchEl.value)
          })

          toggleRawEl.addEventListener('click', () => {
            rawEl.classList.toggle('hidden')
            toggleRawEl.textContent = rawEl.classList.contains('hidden') ? '顯示原始索引' : '隱藏原始索引'
          })
        } catch (err) {
          metaEl.textContent = `載入失敗，請確認 API：${apiBaseUrl}/help/catalog`
          statusEl.textContent = '讀取失敗'
          console.error(err)
        }
      })()
    </script>
  </body>
</html>
