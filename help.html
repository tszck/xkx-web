<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>俠客行 幫助說明</title>
    <style>
      :root {
        --bg: #0f0f0f;
        --panel: #171717;
        --border: #303030;
        --text: #d2d2d2;
        --dim: #8b8b8b;
        --accent: #d8ae4c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(1200px 500px at 20% -10%, #2a2210 0%, transparent 55%), var(--bg);
        color: var(--text);
        font-family: "Noto Sans TC", "Microsoft YaHei", monospace;
      }
      .wrap {
        width: min(1100px, 94vw);
        margin: 24px auto;
        border: 1px solid var(--border);
        background: var(--panel);
        border-radius: 4px;
        overflow: hidden;
      }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
      }
      .title {
        color: var(--accent);
        font-size: 15px;
        letter-spacing: 0.08em;
      }
      .status { color: var(--dim); font-size: 12px; }
      pre {
        margin: 0;
        padding: 14px;
        white-space: pre-wrap;
        line-height: 1.58;
        font-size: 13px;
        overflow: auto;
        max-height: calc(100vh - 120px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <div class="title">俠客行一百 幫助說明</div>
        <div class="status" id="status">讀取中…</div>
      </div>
      <pre id="content">正在載入幫助文件…</pre>
    </div>

    <script>
      (async function main() {
        const statusEl = document.getElementById('status');
        const contentEl = document.getElementById('content');
        try {
          const res = await fetch('/api/help/topics');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const data = await res.json();
          contentEl.textContent = data.text || '無內容';
          statusEl.textContent = '已更新';
        } catch (err) {
          contentEl.textContent = '載入幫助失敗，請確認\u5f8c端服務與 API 路由。';
          statusEl.textContent = '讀取失敗';
          console.error(err);
        }
      })();
    </script>
  </body>
</html>
